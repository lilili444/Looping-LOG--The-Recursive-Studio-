<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="../common.css">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Looping Log</title>
  <style>
    html, body {
      overflow: hidden;
      height: 100%;
      margin: 0;
      padding: 0;
    }
    
    body {
      background-color: #f0f0f0;
      font-family: serif;
    }
    
    .ghost-container {
      position: absolute;
      top: 550px;
      right: 360px;
      width: 900px;
      height: 600px;
      padding: 0px;
      overflow: hidden;
    }
    
    .container {
      overflow: visible;
      width: 100%;
      background: rgba(255, 255, 255, 0);
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 0 30px rgba(0,0,0,0);
      line-height: 1.4;
      font-size: 1.25rem;
      font-family: 'open sans', sans-serif;
      padding-bottom: 30px;
    }
    .typing-section {
      background-color: rgba(0, 0, 0, 0.1);
      padding: 0px 1px;
      border-radius: 0px;
      display: inline-block;
    }

    @keyframes blink-caret {
      from, to { opacity: 1; }
      50% { opacity: 0; }
    }
    

    .typing-section::after {
      content: "|";
      color: #333;
      animation: blink-caret 1s step-end infinite; /* 关键修改 */
    }
  
    @media (max-width: 768px) {
      .container {
        padding: 20px;
      }
    }
    input-section {
      position: sticky;
      bottom: 0;
      background: rgba(255,255,255,0.9);
      z-index: 100;
    }

    input[type="text"] {
      /* 基础尺寸 */
      width: 50%;
      height: 10px;
      padding: 1rem 1.5rem;

      /* 文字样式 */
      font-size: 1.1rem;
      line-height: 1.6;

      /* 边框与背景 */
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      background: rgba(255,255,255,0.98);
  
      /* 过渡动画 */
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);

      /* 聚焦状态 */
      &:focus {
        height: 32px;
        border-color: #f99090;
        box-shadow: 0 2px 8px rgba(144, 202, 249, 0.3);
        outline: none;
      }   
    }

    /* 移动端优化 */
    @media (max-width: 960px) {
      .input-section {
        padding: 0 1rem; /* 两侧留白 */
      }
      .ghost-container {
        overflow: visible;
        min-height: auto;
      }

      input[type="text"] {
        height: 48px;
        padding: 0.8rem 1rem;
        font-size: 1rem;
    
        &:focus {
          height: 52px;
        }
      } 
    }
    </style>
</head>
<body>
  <div id="app">
    <div id="stage" class="stage" style="background-image: url('../backgrounds/5chatgpt.png')">
      <div class="ghost-container">
        <div class="container">
          <p>Could you give me some advice on my research questions：1.Why do such numbers of the artworks in the exhibition express similar topics? 2.Why do these artworks have superb technologies but weak expressions? 3. How the</p>
          <div class="input-section">
            <p><strong>Write a thought(<30 words)and press ENTER to add it to the loop:</strong></p>
            <input type="text" id="userInput" placeholder="Your sentence here...">
          </div>
        </div>
      </div>
    </div>
  </div>
  <button class="jump-button" onclick="randomJump()">Exit</button>
  <script src="../common.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', initStageAndGhost);
  </script>
</body>
</html>
